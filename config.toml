# Animation style. "waterfall" (default) turns the strip into a scrolling
# channel-occupancy spectrogram — bar width = airtime, color = payload type,
# gaps = real silence, heartbeat suppressed. "comet" renders each RX packet
# as a path-tracing comet with the heartbeat sweeping in idle.
# Override at runtime with --style {waterfall,comet}.
style = "waterfall"

[strip]
# Number of LEDs on the physical strip. Set this to match your hardware
# — the original design assumed 144, but this is whatever you actually
# wired up. Drives framebuffer size, heartbeat centering, repeater→pixel
# hash modulus.
pixels = 71

# Per-LED APA102 brightness, 0.0..1.0 (mapped to the 5-bit brightness byte
# in hardware). 0.25 ≈ 8/31 — tuned for a 2-cell USB power bank, all-night
# runtime, art-piece visibility (NOT room-lighting). Raise toward 1.0 if
# running off mains and you want it loud.
brightness = 0.25

[bloom]
# Peak intensity of full-strip blooms. At brightness=0.25, walkup_peak=0.6
# keeps the walk-up showpiece under ~1.3 A peak (safe for a 2 A USB bank).
walkup_peak = 0.6
dim_peak = 0.25

[comet]
# Multiplier on the base per-pixel trail duration (~0.2s). The tail acts as
# a tracer: each pixel the head touches stays lit for tail_duration seconds
# then fades out. Slow / oscillating heads naturally produce short trails;
# fast / wide-ranging heads produce long ones. Trail can never extend past
# pixels the head has actually visited.
tail_duration = 0.1
speed = 1.2                # global speed multiplier (affects dwell+transit)
head_brightness = 2.0      # multiplier on head intensity

[walkup]
rssi_threshold = -45       # PLACEHOLDER — calibrate against rooftop capture, NOT desk data

[rssi_ramp]
gamma = 2.0                # PLACEHOLDER — calibrate against rooftop capture, NOT desk data

[waterfall]
# Bar width per packet:
#     airtime_sec = overhead_sec + payload_length / bytes_per_sec
#
# payload_length (from MeshCore RX) is the FULL on-air MeshCore frame:
# type byte, route flags, path_hash_size byte, path hashes
# (path_hash_size × path_len bytes — grows per hop), encrypted body, MAC.
# It does NOT include the LoRa PHY preamble + explicit-header symbols —
# overhead_sec accounts for those.
#
# Defaults are tuned for the deployment preset SF7 / BW62.5 / CR4-5:
#   - overhead_sec 0.030 ≈ 8-symbol preamble (~25 ms) + a few PHY-header
#     symbols. SF7/BW62.5 T_sym = 2.048 ms.
#   - bytes_per_sec 340 ≈ marginal payload rate at the same preset.
#   - window_seconds 7.0 + exaggeration 1.0 gives an HONEST 1:1 view —
#     1 px = window_seconds/n_pixels of channel time (~100 ms/px at
#     7 s / 71 px), and bar widths are real airtime in those units.
#     Total lit pixels / total pixels = real channel utilization
#     fraction. Crank exaggeration to 4–5 to dramatize collisions (each
#     bar 5× wider than its real airtime) at the cost of "1 px = X ms"
#     no longer holding. Widen window_seconds to 60 for a pure
#     brightness-encoded spectrogram view.
window_seconds = 7.0
bytes_per_sec  = 340.0
overhead_sec   = 0.030
exaggeration   = 1.0
intensity      = 1.0

# Visual smoothing knobs. Defaults add mild smoothing so bars glide
# across pixels at slow scroll rates instead of snapping pixel-to-pixel
# (which the eye reads as choppy at the strip's ~10 px/s scroll). Zero
# all three for a strict spectrogram where bars represent only their
# real airtime extent — more honest about packet size, slightly
# choppier motion on narrow bars.
#
# edge_fade_px — linear taper at each bar's head/tail INSIDE its
#                extent. Width-aware so a 0.5-px ACK isn't squashed
#                to half-brightness at its centre.
# halo_depth /
# halo_peak    — dim halo extending OUTSIDE the bar by halo_depth
#                pixels, ramping from halo_peak at the bar's edge to 0
#                at the halo's outer edge. Smooths motion the most;
#                least honest — narrow bars get long dim tails.
#                halo_peak = 0 disables.
edge_fade_px   = 1.5
halo_depth     = 4.0
halo_peak      = 0.06

# Flow direction. The strip's pixel 0 is the wire-input end (DotStar
# data flows in the direction of the arrow on the PCB). When false,
# bars enter at pixel n-1 (far end) and scroll TOWARD the input wires.
# When true, the live edge is at pixel 0 instead — bars enter at the
# input end and scroll AWAY toward the far end of the strip.
reverse_flow   = true

# Saturation glow. LoRa is ALOHA-class — throughput collapses past
# ~20–30% airtime utilization (S = G·e^(-2G) peaks at G≈0.5 with
# S≈18%, and the per-packet collision rate is 1 - e^(-2G), so 20%
# utilization already means ~33% collisions). When in-window
# utilization climbs past glow_threshold, every UNcovered pixel gets a
# baseline glow that ramps from 0 to glow_peak as utilization approaches
# 2× glow_threshold (40% by default). Bar pixels are unaffected — the
# glow lives BEHIND the bars, payload color stays honest. Quiet channel
# = dark gaps. Saturated channel = warm-red gaps under the bars.
# Set glow_peak = 0 to disable.
glow_threshold = 0.20
glow_peak      = 0.15
glow_color     = [255, 0, 0]

[oled]
# OLED panel controller. The default ssd1309 covers the 2.42" Hosyond
# (and similar) modules — luma's ssd1309 device class is the same as
# ssd1306 with custom pre-charge / VCOMH / contrast applied to suppress
# the SSD1309 column-ghosting (residual charge leak into rows above lit
# pixels). Use "ssd1306" for the smaller 0.96" modules; use "sh1106" if
# you have an SSD1309-labeled module that's actually SH1106 silicon
# (some clones are). If ghosting persists or the panel is dark, dial in
# with utils/screen_debug.py --driver ... --precharge ... --vcomh ...
driver = "ssd1309"
